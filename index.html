    <!-- 提示框系统（Toast） -->
    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        let clientDb = {};

        // 提示信息系统（不使用浏览器内置的丑陋 alert）
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `transform translate-y-5 opacity-0 transition-all duration-300 pointer-events-auto flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-sm font-medium ${
                type === 'success' ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white'
            }`;
            
            toast.innerHTML = `
                <span>${type === 'success' ? '✅' : '⚠️'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);

            // 触发动画
            setTimeout(() => {
                toast.classList.remove('translate-y-5', 'opacity-0');
            }, 10);

            // 自动消失
            setTimeout(() => {
                toast.classList.add('translate-y-5', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // 切换配置面板折叠状态
        function toggleConfig(forceState = null) {
            const body = document.getElementById('configBody');
            const arrow = document.getElementById('collapseArrow');
            const text = document.getElementById('collapseText');
            
            // 如果传入了强制状态，则使用强制状态；否则直接取反
            const willCollapse = forceState !== null ? forceState : !body.classList.contains('hidden');

            if (willCollapse) {
                // 折叠
                body.classList.add('hidden');
                arrow.classList.add('-rotate-90');
                text.innerText = "点击展开";
                localStorage.setItem('receivable_db_collapsed', 'true');
            } else {
                // 展开
                body.classList.remove('hidden');
                arrow.classList.remove('-rotate-90');
                text.innerText = "已展开";
                localStorage.setItem('receivable_db_collapsed', 'false');
            }
        }

        // 解析输入的客户数据库并缓存
        function updateDatabase() {
            clientDb = {};
            let text = document.getElementById('databaseInput').value;
            let lines = text.split('\n');
            
            lines.forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;
                let match = trimmed.match(/^(\d+)\s+(.+)$/);
                if (match) {
                    let id = parseInt(match[1]);
                    let name = match[2].trim();
                    clientDb[id] = name;
                }
            });

            // 更新全部行的客户匹配状态
            document.querySelectorAll('.cust-id').forEach(input => {
                lookupClient(input);
            });
        }

        // 修改配置并自动保存到 LocalStorage
        function updateDatabaseAndSave() {
            updateDatabase();
            localStorage.setItem('receivable_client_db', document.getElementById('databaseInput').value);
        }

        // 根据序号查询并展示对应客户名称
        function lookupClient(idInput) {
            let row = idInput.closest('tr');
            let nameInput = row.querySelector('.cust-name');
            let id = parseInt(idInput.value);

            if (id && clientDb[id]) {
                nameInput.value = clientDb[id];
                nameInput.classList.remove('text-rose-500', 'font-semibold');
                nameInput.classList.add('text-slate-600');
            } else {
                nameInput.value = id ? "⚠️ 未匹配到客户" : "";
                if (id) {
                    nameInput.classList.remove('text-slate-600');
                    nameInput.classList.add('text-rose-500', 'font-semibold');
                }
            }
            saveRowsToStorage();
        }

        // 格式化数字，消除不必要的浮点精度问题（如 0.1+0.2=0.3000000000004）
        function fmtNum(num) {
            let fixed = Math.round(num * 100) / 100;
            return fixed % 1 === 0 ? String(Math.trunc(fixed)) : String(fixed);
        }

        // 解析算式并计算单行结果
        function calculateRow(inputEl) {
            let row = inputEl.closest('tr');
            let rawExpress = inputEl.value.trim().replace(/，/g, ',').replace(/ /g, '');
            let resultTd = row.querySelector('.result-text');

            if (!rawExpress) {
                resultTd.innerText = "0";
                updateTotals();
                saveRowsToStorage();
                return;
            }

            // 正则解析所有数字和它们前面的符号
            let tokens = rawExpress.match(/([+-]?\d*\.?\d+)/g);
            if (!tokens) {
                resultTd.innerText = "0";
                updateTotals();
                saveRowsToStorage();
                return;
            }

            let formattedParts = [];
            let totalVal = 0;
            let count = 0;

            tokens.forEach((token, index) => {
                let val = parseFloat(token);
                if (isNaN(val)) return;
                totalVal += val;
                count++;

                let uVal = Math.abs(val);
                let sign = val >= 0 ? "+" : "-";
                
                if (index === 0) {
                    formattedParts.push(val >= 0 ? fmtNum(uVal) : "-" + fmtNum(uVal));
                } else {
                    formattedParts.push(`${sign}${fmtNum(uVal)}`);
                }
            });

            let finalExpress = formattedParts.join("");

            if (count === 1 && parseFloat(tokens[0]) >= 0) {
                resultTd.innerText = fmtNum(totalVal);
            } else {
                resultTd.innerText = `${finalExpress}=${fmtNum(totalVal)}`;
            }

            updateTotals();
            saveRowsToStorage();
        }

        // 新增一行表格
        function addRow(initId = "", initExpress = "", initResult = "0") {
            let tbody = document.querySelector('#calcTable tbody');
            let tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition duration-150 group";
            tr.innerHTML = `
                <td class="py-3 px-4">
                    <input type="number" class="cust-id w-full bg-slate-50 group-hover:bg-white border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition duration-150" placeholder="序号" value="${initId}" oninput="lookupClient(this)">
                </td>
                <td class="py-3 px-4">
                    <input type="text" class="cust-name w-full bg-slate-100 text-slate-500 border border-slate-200 rounded px-2.5 py-1.5 text-sm cursor-not-allowed" placeholder="客户匹配中..." value="" readonly>
                </td>
                <td class="py-3 px-4">
                    <input type="text" class="calc-input w-full bg-slate-50 group-hover:bg-white border border-slate-200 rounded px-2.5 py-1.5 text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:outline-none transition duration-150" placeholder="如: 120.5+80-10" value="${initExpress}" oninput="calculateRow(this)">
                </td>
                <td class="py-3 px-4 font-mono font-bold text-slate-700 result-text text-sm">
                    ${initResult}
                </td>
                <td class="py-3 px-4 text-center">
                    <div class="flex items-center justify-center gap-2">
                        <button class="bg-amber-100 hover:bg-amber-200 text-amber-800 px-2.5 py-1 rounded text-xs font-medium transition duration-150" onclick="copyResult(this)">复制</button>
                        <button class="bg-rose-100 hover:bg-rose-200 text-rose-700 px-2.5 py-1 rounded text-xs font-medium transition duration-150" onclick="deleteRow(this)">删除</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);

            // 执行关联与计算
            let idInput = tr.querySelector('.cust-id');
            let calcInput = tr.querySelector('.calc-input');
            lookupClient(idInput);
            if (initExpress) {
                calculateRow(calcInput);
            }
            updateTotals();
        }

        // 删除一行
        function deleteRow(btn) {
            btn.closest('tr').remove();
            updateTotals();
            saveRowsToStorage();
            showToast("已删除该核算行");
        }

        // 一键清空工作台
        function clearAllRows() {
            if (confirm("确定要清空工作台上的所有数据吗？此操作无法撤销。")) {
                document.querySelector('#calcTable tbody').innerHTML = "";
                updateTotals();
                saveRowsToStorage();
                showToast("工作台已完全重置", "success");
            }
        }

        // 复制单行结果
        function copyResult(btn) {
            let row = btn.closest('tr');
            let resultText = row.querySelector('.result-text').innerText;
            
            let textArea = document.createElement("textarea");
            textArea.value = resultText;
            textArea.style.position = "fixed"; 
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                // 使用 document.execCommand 以确保在 Canvas 兼容环境中也能完全运行
                document.execCommand('copy');
                let originalText = btn.innerText;
                btn.innerText = "已复制";
                btn.className = "bg-emerald-500 text-white px-2.5 py-1 rounded text-xs font-medium transition duration-150";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.className = "bg-amber-100 hover:bg-amber-200 text-amber-800 px-2.5 py-1 rounded text-xs font-medium transition duration-150";
                }, 1200);
                showToast("计算过程复制成功！");
            } catch (err) {
                showToast("复制失败，请尝试手动选中文本复制。", "error");
            }
            document.body.removeChild(textArea);
        }

        // 统计面板更新
        function updateTotals() {
            let rows = document.querySelectorAll('#calcTable tbody tr');
            let totalAmount = 0;
            let validRowsCount = 0;

            rows.forEach(row => {
                let resultText = row.querySelector('.result-text').innerText;
                if (resultText && resultText !== "0") {
                    let parts = resultText.split('=');
                    let finalVal = parseFloat(parts[parts.length - 1]);
                    if (!isNaN(finalVal)) {
                        totalAmount += finalVal;
                    }
                }
                validRowsCount++;
            });

            document.getElementById('totalRows').innerText = validRowsCount;
            document.getElementById('totalAmount').innerText = '¥' + totalAmount.toFixed(2);
        }

        // 将工作台的数据实时存档在本地，不怕刷新
        function saveRowsToStorage() {
            let rows = document.querySelectorAll('#calcTable tbody tr');
            let dataToSave = [];
            rows.forEach(row => {
                let id = row.querySelector('.cust-id').value;
                let express = row.querySelector('.calc-input').value;
                let result = row.querySelector('.result-text').innerText;
                dataToSave.push({ id, express, result });
            });
            localStorage.setItem('receivable_rows', JSON.stringify(dataToSave));
        }

        // 从本地存储还原数据
        function loadRowsFromStorage() {
            let savedRows = localStorage.getItem('receivable_rows');
            if (savedRows) {
                try {
                    let parsed = JSON.parse(savedRows);
                    if (parsed.length > 0) {
                        parsed.forEach(item => {
                            addRow(item.id, item.express, item.result);
                        });
                        return;
                    }
                } catch(e) {
                    console.error("加载存档失败，正在初始化默认行", e);
                }
            }
            // 默认展示一行示范
            addRow("1", "102.6+31.05", "102.6+31.05=133.65");
        }

        // 导出核算表格 (CSV)
        function exportCSV() {
            let rows = document.querySelectorAll('#calcTable tbody tr');
            if (rows.length === 0) {
                showToast("当前工作台上没有任何数据可以导出", "error");
                return;
            }

            let csvContent = "\uFEFF序号,客户名称,应收款核算过程\n";
            
            rows.forEach(row => {
                let id = row.querySelector('.cust-id').value;
                let name = row.querySelector('.cust-name').value.replace(/,/g, ' ');
                let result = row.querySelector('.result-text').innerText;
                csvContent += `${id},${name},"${result}"\n`;
            });

            let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            let url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `应收款核算报表_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("核算表格导出成功！");
        }

        // 初始化
        window.onload = function() {
            // 首先尝试从 LocalStorage 读取之前保存的客户数据库，如果读取不到则使用写在 HTML 里的初始140家
            let savedDb = localStorage.getItem('receivable_client_db');
            if (savedDb) {
                document.getElementById('databaseInput').value = savedDb;
            }

            updateDatabase();
            loadRowsFromStorage();

            // 读取折叠状态，默认为“不折叠”(false)
            let isCollapsed = localStorage.getItem('receivable_db_collapsed') === 'true';
            toggleConfig(isCollapsed);
        }
    </script>

</body>
</html>
